# C?u h́nh Database H2 cho Test
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# C?u h́nh JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# T?T LIQUIBASE CHO TEST (?? tránh l?i không t́m th?y file changelog)
spring.liquibase.enabled=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.client.registration.google.client-id=65
spring.security.oauth2.client.registration.google.client-secret=GOC
spring.security.oauth2.client.registration.google.scope=profile,email

oauth2.auth-server-url=http://localhost:8082
oauth2.client-id=project_1_client
oauth2.client-secret=secret123
oauth2.redirect-uri=http://localhost:8081/callback

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual_immediate